<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Recipe Book">
<link rel="apple-touch-icon" sizes="120x120" href="recipe-icon-120.png">
<link rel="apple-touch-icon" sizes="152x152" href="recipe-icon-152.png">
<link rel="apple-touch-icon" sizes="180x180" href="recipe-icon-180.png">
<link rel="icon" sizes="512x512" href="recipe-icon-512.png">
<title>My Recipe Book</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --primary: #e8734a;
    --primary-light: #fff0eb;
    --bg: #faf8f5;
    --card-bg: #ffffff;
    --text: #2d2d2d;
    --text-light: #888;
    --border: #eee;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
    --radius: 14px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 100px;
  }

  /* Header */
  .header {
    background: white;
    padding: 20px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid var(--border);
  }
  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
  }
  .header h1 span { color: var(--primary); }
  .btn-add {
    background: var(--primary);
    color: white;
    border: none;
    width: 40px; height: 40px;
    border-radius: 50%;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s;
  }
  .btn-add:hover { transform: scale(1.1); }

  /* Search */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap input {
    width: 100%;
    padding: 12px 16px 12px 42px;
    border: 2px solid var(--border);
    border-radius: 12px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    background: var(--bg);
  }
  .search-wrap input:focus { border-color: var(--primary); }
  .search-wrap .search-icon {
    position: absolute;
    left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    font-size: 16px;
  }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    -webkit-overflow-scrolling: touch;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 8px 16px;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: white;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    color: var(--text);
  }
  .filter-btn.active {
    background: var(--primary);
    color: white;
    border-color: var(--primary);
  }
  .filter-btn:hover:not(.active) {
    border-color: var(--primary);
    color: var(--primary);
  }

  /* Recipe count */
  .recipe-count {
    padding: 16px 24px 8px;
    font-size: 13px;
    color: var(--text-light);
    font-weight: 500;
  }

  /* Recipe List */
  .recipe-list {
    padding: 8px 16px;
    display: grid;
    gap: 12px;
  }
  .recipe-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 18px 20px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 16px;
    border: 1.5px solid transparent;
  }
  .recipe-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    border-color: var(--primary);
  }
  .recipe-emoji {
    font-size: 36px;
    width: 56px;
    height: 56px;
    background: var(--primary-light);
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .recipe-info { flex: 1; min-width: 0; }
  .recipe-info h3 {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .recipe-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 12px;
    color: var(--text-light);
  }
  .recipe-tag {
    background: var(--primary-light);
    color: var(--primary);
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
  }
  .recipe-arrow {
    color: #ccc;
    font-size: 18px;
    flex-shrink: 0;
  }

  /* Detail View */
  .detail-view {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 200;
    overflow-y: auto;
    animation: slideIn 0.3s ease;
  }
  @keyframes slideIn {
    from { transform: translateX(100%); }
    to { transform: translateX(0); }
  }
  .detail-view.show { display: block; }
  .detail-header {
    background: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .btn-back {
    background: none;
    border: none;
    font-size: 22px;
    cursor: pointer;
    padding: 4px;
    color: var(--primary);
  }
  .detail-header h2 {
    font-size: 18px;
    font-weight: 600;
    flex: 1;
  }
  .btn-delete {
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    padding: 4px 8px;
    color: #ccc;
    transition: color 0.2s;
  }
  .btn-delete:hover { color: #e74c3c; }
  .detail-body { padding: 20px; }
  .detail-emoji-wrap {
    text-align: center;
    margin-bottom: 20px;
  }
  .detail-emoji {
    font-size: 64px;
    display: inline-block;
    background: var(--primary-light);
    width: 100px;
    height: 100px;
    line-height: 100px;
    border-radius: 24px;
  }
  .detail-tag {
    display: inline-block;
    background: var(--primary);
    color: white;
    padding: 4px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    margin-top: 10px;
  }
  .detail-section {
    background: white;
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 14px;
    box-shadow: var(--shadow);
  }
  .detail-section h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 14px;
    color: var(--primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .ingredient-list {
    list-style: none;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ingredient-list li {
    padding: 8px 12px;
    background: var(--bg);
    border-radius: 8px;
    font-size: 14px;
  }
  .step-list { list-style: none; counter-reset: step; }
  .step-list li {
    counter-increment: step;
    padding: 12px 12px 12px 44px;
    position: relative;
    font-size: 14px;
    line-height: 1.6;
    border-bottom: 1px solid var(--border);
  }
  .step-list li:last-child { border-bottom: none; }
  .step-list li::before {
    content: counter(step);
    position: absolute;
    left: 8px; top: 12px;
    width: 26px; height: 26px;
    background: var(--primary);
    color: white;
    border-radius: 50%;
    text-align: center;
    line-height: 26px;
    font-size: 13px;
    font-weight: 700;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.5);
    z-index: 300;
    align-items: flex-end;
    justify-content: center;
    animation: fadeIn 0.2s;
  }
  .modal-overlay.show { display: flex; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    border-radius: 20px 20px 0 0;
    overflow-y: auto;
    animation: slideUp 0.3s ease;
    padding: 24px;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    text-align: center;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--text-light);
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    width: 100%;
    padding: 12px 14px;
    border: 2px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus {
    border-color: var(--primary);
  }
  .form-group textarea {
    min-height: 100px;
    resize: vertical;
  }
  .form-hint {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .modal-btns {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-btns button {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn-cancel {
    background: var(--bg);
    color: var(--text);
  }
  .btn-save {
    background: var(--primary);
    color: white;
  }
  .btn-save:hover { opacity: 0.9; }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--text-light);
  }
  .empty-state .empty-icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state p { font-size: 15px; line-height: 1.6; }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #333;
    color: white;
    padding: 12px 24px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    transition: transform 0.3s ease;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @media (min-width: 600px) {
    .recipe-list { grid-template-columns: 1fr 1fr; }
    .modal { border-radius: 20px; margin-bottom: 20px; }
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-top">
    <h1>My <span>Recipe</span> Book</h1>
    <button class="btn-add" onclick="openModal()" title="레시피 추가">+</button>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="요리 이름 또는 재료 검색..." oninput="renderList()">
  </div>
  <div class="filters" id="filterWrap"></div>
</div>

<!-- Recipe count -->
<div class="recipe-count" id="recipeCount"></div>

<!-- Recipe List -->
<div class="recipe-list" id="recipeList"></div>

<!-- Detail View -->
<div class="detail-view" id="detailView">
  <div class="detail-header">
    <button class="btn-back" onclick="closeDetail()">←</button>
    <h2 id="detailTitle"></h2>
    <button class="btn-delete" onclick="deleteRecipe()" title="삭제">🗑️</button>
  </div>
  <div class="detail-body" id="detailBody"></div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h2>레시피 추가</h2>
    <div class="form-group">
      <label>요리 이름 *</label>
      <input type="text" id="formName" placeholder="예: 김치찌개">
    </div>
    <div class="form-group">
      <label>음식 종류 *</label>
      <select id="formCategory">
        <option value="한식">한식</option>
        <option value="중식">중식</option>
        <option value="일식">일식</option>
        <option value="양식">양식</option>
        <option value="동남아">동남아</option>
        <option value="분식">분식</option>
        <option value="디저트">디저트</option>
        <option value="기타">기타</option>
      </select>
    </div>
    <div class="form-group">
      <label>대표 이모지</label>
      <input type="text" id="formEmoji" placeholder="예: 🍲" maxlength="4">
    </div>
    <div class="form-group">
      <label>재료</label>
      <textarea id="formIngredients" placeholder="한 줄에 하나씩 입력&#10;예:&#10;돼지고기 300g&#10;김치 1포기&#10;두부 1모"></textarea>
      <div class="form-hint">한 줄에 재료 하나씩 입력</div>
    </div>
    <div class="form-group">
      <label>요리 방법</label>
      <textarea id="formSteps" placeholder="한 줄에 한 단계씩 입력&#10;예:&#10;돼지고기를 한입 크기로 썬다&#10;김치와 함께 볶는다&#10;물을 넣고 끓인다" style="min-height:140px"></textarea>
      <div class="form-hint">한 줄에 한 단계씩 입력</div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveRecipe()">저장</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===== DATA =====
const CATEGORY_EMOJIS = {
  '한식': '🇰🇷', '중식': '🇨🇳', '일식': '🇯🇵', '양식': '🍝',
  '동남아': '🌴', '분식': '🍢', '디저트': '🍰', '기타': '🍽️'
};
const DEFAULT_EMOJIS = {
  '한식': '🍲', '중식': '🥟', '일식': '🍣', '양식': '🍝',
  '동남아': '🍜', '분식': '🍢', '디저트': '🍰', '기타': '🍽️'
};

let activeFilter = '전체';
let currentRecipeId = null;

// ===== RECIPES =====
let recipes = [
    {
      id: Date.now() + 1,
      name: '테스트요리',
      category: '기타',
      emoji: '🍽️',
      ingredients: [],
      steps: []
    },
    {
      id: Date.now(),
      name: '제육볶음',
      category: '한식',
      emoji: '🥘',
      ingredients: ['돼지고기 앞다리살 600g', '설탕 2스푼', '간장 2스푼', '고추장 2스푼', '고춧가루 2스푼', '맛술 3스푼', '물엿 2스푼', '굴소스 1스푼', '다진마늘 1스푼', '양파 1개', '대파 1대', '청양고추 2개', '통깨', '식용유'],
      steps: ['설탕 2스푼, 간장 2스푼을 넣고 고기에 밑간해서 30분 정도 재워둔다', '양념장(고추장 2스푼, 고춧가루 2스푼, 맛술 3스푼, 물엿 2스푼, 굴소스 1스푼, 다진마늘 1스푼)을 버무려서 고기 재우는 동안 숙성시킨다', '팬에 식용유를 두르고 고기를 익혀준다', '고기가 어느정도 익으면 양념장을 넣고 양념이 고기에 베이게 버무린다', '고기가 거의 익었다 싶으면 양파 1개 채썰고, 대파 1대 길게 썰어서 넣고 같이 볶는다', '양파가 투명해지면 청양고추 2개 어슷썰어 넣고 통깨로 마무리한다']
    }
];

// ===== FUNCTIONS =====

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function getCategories() {
  const cats = [...new Set(recipes.map(r => r.category))];
  return ['전체', ...cats.sort()];
}

function renderFilters() {
  const wrap = document.getElementById('filterWrap');
  const cats = getCategories();
  wrap.innerHTML = cats.map(c =>
    `<button class="filter-btn ${c === activeFilter ? 'active' : ''}"
            onclick="setFilter('${c}')">${CATEGORY_EMOJIS[c] || '📋'} ${c}</button>`
  ).join('');
}

function setFilter(cat) {
  activeFilter = cat;
  renderFilters();
  renderList();
}

function renderList() {
  const query = document.getElementById('searchInput').value.toLowerCase().trim();
  let filtered = recipes;

  if (activeFilter !== '전체') {
    filtered = filtered.filter(r => r.category === activeFilter);
  }
  if (query) {
    filtered = filtered.filter(r =>
      r.name.toLowerCase().includes(query) ||
      r.ingredients.some(i => i.toLowerCase().includes(query))
    );
  }

  document.getElementById('recipeCount').textContent =
    `${filtered.length}개의 레시피`;

  const list = document.getElementById('recipeList');
  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1">
        <div class="empty-icon">📖</div>
        <p>${query ? '검색 결과가 없습니다' : '레시피를 추가해보세요!'}<br>
        <span style="font-size:13px;color:#aaa">+ 버튼으로 직접 추가하거나<br>Claude에게 스크린샷을 보내주세요</span></p>
      </div>`;
    return;
  }

  list.innerHTML = filtered.map(r => `
    <div class="recipe-card" onclick="openDetail(${r.id})">
      <div class="recipe-emoji">${r.emoji || DEFAULT_EMOJIS[r.category] || '🍽️'}</div>
      <div class="recipe-info">
        <h3>${r.name}</h3>
        <div class="recipe-meta">
          <span class="recipe-tag">${r.category}</span>
          <span>재료 ${r.ingredients.length}개</span>
          <span>·</span>
          <span>${r.steps.length}단계</span>
        </div>
      </div>
      <span class="recipe-arrow">›</span>
    </div>
  `).join('');
}

function openDetail(id) {
  currentRecipeId = id;
  const r = recipes.find(x => x.id === id);
  if (!r) return;

  document.getElementById('detailTitle').textContent = r.name;
  document.getElementById('detailBody').innerHTML = `
    <div class="detail-emoji-wrap">
      <div class="detail-emoji">${r.emoji || DEFAULT_EMOJIS[r.category] || '🍽️'}</div>
      <div><span class="detail-tag">${r.category}</span></div>
    </div>
    <div class="detail-section">
      <h3>🥬 재료 (${r.ingredients.length})</h3>
      <ul class="ingredient-list">
        ${r.ingredients.map(i => `<li>${i}</li>`).join('')}
      </ul>
    </div>
    <div class="detail-section">
      <h3>👨‍🍳 요리 방법</h3>
      <ol class="step-list">
        ${r.steps.map(s => `<li>${s}</li>`).join('')}
      </ol>
    </div>
  `;
  document.getElementById('detailView').classList.add('show');
}

function closeDetail() {
  document.getElementById('detailView').classList.remove('show');
  currentRecipeId = null;
}

function deleteRecipe() {
  if (!currentRecipeId) return;
  if (!confirm('이 레시피를 삭제할까요?')) return;
  recipes = recipes.filter(r => r.id !== currentRecipeId);

  closeDetail();
  renderFilters();
  renderList();
  showToast('레시피가 삭제되었습니다');
}

function openModal() {
  document.getElementById('modalOverlay').classList.add('show');
  document.getElementById('formName').value = '';
  document.getElementById('formCategory').value = '한식';
  document.getElementById('formEmoji').value = '';
  document.getElementById('formIngredients').value = '';
  document.getElementById('formSteps').value = '';
  setTimeout(() => document.getElementById('formName').focus(), 300);
}

function closeModal(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('modalOverlay').classList.remove('show');
}

function saveRecipe() {
  const name = document.getElementById('formName').value.trim();
  const category = document.getElementById('formCategory').value;
  const emoji = document.getElementById('formEmoji').value.trim();
  const ingredientsRaw = document.getElementById('formIngredients').value.trim();
  const stepsRaw = document.getElementById('formSteps').value.trim();

  if (!name) {
    alert('요리 이름을 입력해주세요');
    return;
  }

  const ingredients = ingredientsRaw ? ingredientsRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];
  const steps = stepsRaw ? stepsRaw.split('\n').map(s => s.trim()).filter(Boolean) : [];

  recipes.push({
    id: Date.now(),
    name,
    category,
    emoji: emoji || DEFAULT_EMOJIS[category] || '🍽️',
    ingredients,
    steps
  });


  closeModal();
  renderFilters();
  renderList();
  showToast('레시피가 추가되었습니다!');
}

// ===== API for Claude to add recipes programmatically =====
// Usage: addRecipeFromClaude({name, category, emoji, ingredients:[], steps:[]})
function addRecipeFromClaude(data) {
  recipes.push({
    id: Date.now(),
    name: data.name,
    category: data.category || '기타',
    emoji: data.emoji || DEFAULT_EMOJIS[data.category] || '🍽️',
    ingredients: data.ingredients || [],
    steps: data.steps || []
  });

  renderFilters();
  renderList();
  showToast(`"${data.name}" 추가 완료!`);
}

// Back button support
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('modalOverlay').classList.contains('show')) closeModal();
    else if (document.getElementById('detailView').classList.contains('show')) closeDetail();
  }
});

// Init
renderFilters();
renderList();
</script>
